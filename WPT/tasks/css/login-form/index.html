<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f9fafb;
        --card: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --primary: #111827;
        --primary-light: #374151;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: "Inter", sans-serif;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: var(--card);
        border-radius: 12px;
        padding: 36px 32px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }

      .brand {
        font-weight: 600;
        font-size: 18px;
        margin-bottom: 28px;
        color: var(--text);
        letter-spacing: 0.3px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 6px;
        color: var(--text);
      }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 28px;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        font-size: 13px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: all 0.2s ease;
        background: #fff;
      }

      input:hover {
        border-color: #d1d5db;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
      }

      .field-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .forgot {
        font-size: 12px;
        color: var(--primary);
        text-decoration: none;
      }

      .forgot:hover {
        text-decoration: underline;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 18px 0 20px;
        font-size: 13px;
        color: var(--muted);
      }

      .remember input {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn:hover {
        background: var(--primary-light);
        transform: translateY(-1px);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 22px 0;
        font-size: 12px;
        color: var(--muted);
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .signup {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      }

      .signup a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .signup a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="brand">CDAC</div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>

      <form>
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <div class="field-row">
            <label>Password</label>
            <a href="#" class="forgot">Forgot?</a>
          </div>
          <input type="password" placeholder="••••••••" />
        </div>

        <div class="remember">
          <input type="checkbox" />
          <span>Remember me</span>
        </div>

        <button class="btn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <p class="signup">Don’t have an account? <a href="#">Sign up</a></p>
    </div>
  </body>
</html>

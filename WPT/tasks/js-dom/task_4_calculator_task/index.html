<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="cal-container">
      <h2>Calculator</h2>
      <div>
        <label for="num1">Number 1:</label>
        <input type="number" id="num1" class="input-container" />
      </div>
      <div>
        <label for="num2">Number 2:</label>
        <input type="number" id="num2" class="input-container" />
      </div>
      <div class="btn-group">
        <button onclick="calculate('Addition')">Addition</button>
        <button onclick="calculate('Subtraction')">Subtraction</button>
        <button onclick="calculate('Multiplication')">Multiplication</button>
        <button onclick="calculate('Division')">Division</button>
      </div>
      <h3 id="result">Result: 0</h3>
    </div>
  </body>
  <script>
    function calculate(operation) {
      const num1 = parseFloat(document.getElementById("num1").value);
      const num2 = parseFloat(document.getElementById("num2").value);
      const resultElement = document.getElementById("result");

      if (isNaN(num1) || isNaN(num2)) {
        resultElement.innerText = "Please enter valid numbers.";
        return;
      }

      let result;

      switch (operation) {
        case "Addition":
          result = num1 + num2;
          break;
        case "Subtraction":
          result = num1 - num2;
          break;
        case "Multiplication":
          result = num1 * num2;
          break;
        case "Division":
          if (num2 === 0) {
            resultElement.innerText = "Cannot divide by zero.";
            return;
          }
          result = num1 / num2;
          break;
        default:
          resultElement.innerText = "Invalid operation.";
          return;
      }

      resultElement.innerText = `Result: ${result}`;
    }
  </script>
</html>
